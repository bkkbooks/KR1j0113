body:
  text: 韻略弬弓名廣韻上平聲七之弬字注荾胡荾香菜也釋元應十誦律音義𥶜被也廣韻上平聲十一模𥶜字注薰陸香出大秦國廣韻上平聲二十文薰字注咬咬鳥鳴也音交文選禰正平鸚鵡賦注邏謂循行非違也四分律音義尚凡主天子之物皆曰尚尚衣尚食等是也廣韻去聲四十一漾尚字注䋢馭右迴廣韻入聲十六屑䋢字注𩍖履頭也廣韻入聲二十四職𩍖字注篾𥲑也今蜀及關中亦謂篾為𥲑僧祗律音義引作詩韻集略
